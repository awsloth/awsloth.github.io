<html>
<head>
  <title>TIMER</title>
  <link rel="stylesheet" href="../main.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100%">
<!-- Display the countdown timer in an element -->

<ul id="Dates">
</ul>

<script>
var examDates = [["Combinatorics and Communication Theory", new Date("May 14, 2026 09:30:00").getTime()],
                 ["Advanced Cryptography", new Date("May 15, 2026 14:00:00").getTime()],
                 ["Advanced Topics in Algebra", new Date("May 19, 2026 09:30:00").getTime()],
                 ["Group Theory", new Date("May 19, 2026 09:30:00").getTime()],
                 ["Functional and Fourier Analysis", new Date("Jun 01, 2026 09:30:00").getTime()],
                 ["Randomness and Computation", new Date("Jun 05, 2026 09:30:00").getTime()]
                ]


function updateTimers(elem, item) {

  // Get today's date and time
  var now = new Date().getTime();

  // Find the distance between now and the count down date
  var distance = item[1] - now;

  // Time calculations for days, hours, minutes and seconds
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Display the result in the element with id="demo"
  elem.innerHTML = item[0] + ": " + days + "d " + hours + "h "
  + minutes + "m " + seconds + "s ";

  console.log(now);
}

var list = document.getElementById("Dates");
var listItems = [];

for (let i = 0; i < examDates.length; i++) {
    // createNewElement
    let li = document.createElement("li");
    listItems.push(li);

    // Update the count down every 1 second
    var x = setInterval(function() {updateTimers(listItems[i], examDates[i])}, 1000);
}

for (let i = 0; i < listItems.length; i++) {
    list.appendChild(listItems[i]);
}
</script>
</body>
